version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: gigs-anchor-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: gigs_anchor
      MYSQL_USER: gigs_user
      MYSQL_PASSWORD: gigs_password
    ports:
      - "3306:3306"
    volumes:
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
